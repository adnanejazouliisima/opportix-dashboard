kind = "web"
previewPath = "/"
title = "NETWORK Fleet Dashboard"
version = "1.0.0"
id = "artifacts/network"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22467

[services.development]
run = "pnpm --filter @workspace/network run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/network", "run", "build" ]
publicDir = "artifacts/network/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22467"
BASE_PATH = "/"
